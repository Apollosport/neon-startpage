server {
    listen 80;

    # 1. Serve the UI normally
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
    }

    # 2. Forward all API calls to the Python FastAPI container
    location /api/ {
        proxy_pass http://start-scraper:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Serve the dynamic JSON config
    location /config.json {
        alias /data/config.json;
    }
}