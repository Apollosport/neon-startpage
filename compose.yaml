services:
  webserver:
    image: nginx:alpine
    container_name: start-web
    restart: unless-stopped
    ports:
      - "8080:80" # Access the UI at http://localhost:8080
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./data:/data:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  scraper:
    image: python:3.11-slim
    container_name: start-scraper
    restart: unless-stopped
    volumes:
      - ./app:/app
      - ./html:/html:rw
      - ./data:/data:rw
    working_dir: /app
    command: >
      /bin/bash -c "
      pip install --no-cache-dir folium geopy requests beautifulsoup4 fastapi uvicorn pydantic python-dotenv &&
      python -m uvicorn api:app --host 0.0.0.0 --port 8000
      "